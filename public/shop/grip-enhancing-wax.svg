      <stop offset="0%" stop-color="#ebe4da"/>
      <stop offset="100%" stop-color="#f5e6e9"/>
    </linearGradient>
    <linearGradient id="sheen-grip-enhancing-wax" x1="0%" y1="0%" x2="0%" y2="100%">
