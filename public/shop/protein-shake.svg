<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Protein Shake">
  <defs>
    <linearGradient id="bg-protein-shake" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ec"/>
      <stop offset="100%" stop-color="#f5e6e9"/>
    </linearGradient>
    <linearGradient id="sheen-protein-shake" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-protein-shake" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4a433c" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg-protein-shake)"/>
  <rect width="800" height="600" fill="url(#sheen-protein-shake)"/>
  <circle cx="700" cy="60" r="140" fill="#8a9a85" fill-opacity="0.14"/>
  <circle cx="40" cy="540" r="110" fill="#8a9a85" fill-opacity="0.1"/>
  <g filter="url(#soft-protein-shake)" transform="translate(0, 40)">
    <path d="M340 100 L355 340 L445 340 L460 100 Z" fill="#8a9a85"/>
      <ellipse cx="400" cy="100" rx="60" ry="22" fill="#758574"/>
      <rect x="370" y="140" width="60" height="120" rx="10" fill="#fffcf9" opacity="0.35"/>
      <text x="400" y="280" text-anchor="middle" fill="#f8f5f0" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700">PROTEIN</text>
      <ellipse cx="400" cy="360" rx="50" ry="10" fill="#4a433c" fill-opacity="0.1"/>
  </g>
</svg>