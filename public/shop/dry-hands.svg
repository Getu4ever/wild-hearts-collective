<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Dry Hands">
  <defs>
    <linearGradient id="bg-dry-hands" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6e9"/>
      <stop offset="100%" stop-color="#f8f5f0"/>
    </linearGradient>
    <linearGradient id="sheen-dry-hands" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-dry-hands" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4a433c" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg-dry-hands)"/>
  <rect width="800" height="600" fill="url(#sheen-dry-hands)"/>
  <circle cx="700" cy="60" r="140" fill="#d58a94" fill-opacity="0.14"/>
  <circle cx="40" cy="540" r="110" fill="#d58a94" fill-opacity="0.1"/>
  <g filter="url(#soft-dry-hands)" transform="translate(0, 40)">
    <rect x="350" y="65" width="100" height="35" rx="8" fill="#6b5f54"/>
      <rect x="335" y="95" width="130" height="240" rx="16" fill="#4a433c"/>
      <rect x="355" y="135" width="90" height="140" rx="10" fill="#d58a94" fill-opacity="0.4"/>
      <text x="400" y="205" text-anchor="middle" fill="#f5e6e9" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">DRY</text>
      <text x="400" y="228" text-anchor="middle" fill="#f5e6e9" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">HANDS</text>
  </g>
</svg>