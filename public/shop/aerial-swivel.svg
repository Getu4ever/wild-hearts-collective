<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Swivel">
  <defs>
    <linearGradient id="bg-aerial-swivel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f5f0"/>
      <stop offset="100%" stop-color="#eef2ec"/>
    </linearGradient>
    <linearGradient id="sheen-aerial-swivel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-aerial-swivel" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4a433c" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg-aerial-swivel)"/>
  <rect width="800" height="600" fill="url(#sheen-aerial-swivel)"/>
  <circle cx="700" cy="60" r="140" fill="#8a9a85" fill-opacity="0.14"/>
  <circle cx="40" cy="540" r="110" fill="#8a9a85" fill-opacity="0.1"/>
  <g filter="url(#soft-aerial-swivel)" transform="translate(0, 40)">
    <circle cx="400" cy="180" r="60" fill="none" stroke="#6b5f54" stroke-width="16"/>
      <circle cx="400" cy="180" r="30" fill="#ebe4da" stroke="#8a8178" stroke-width="7"/><circle cx="400" cy="180" r="10" fill="#6b5f54"/>
      <rect x="384" y="55" width="32" height="60" rx="10" fill="#8a9a85"/><rect x="384" y="245" width="32" height="60" rx="10" fill="#8a9a85"/>
  </g>
</svg>