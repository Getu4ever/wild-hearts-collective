<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Liquid Chalk">
  <defs>
    <linearGradient id="bg-liquid-chalk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f5f0"/>
      <stop offset="100%" stop-color="#eef2ec"/>
    </linearGradient>
    <linearGradient id="sheen-liquid-chalk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-liquid-chalk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4a433c" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg-liquid-chalk)"/>
  <rect width="800" height="600" fill="url(#sheen-liquid-chalk)"/>
  <circle cx="700" cy="60" r="140" fill="#8a9a85" fill-opacity="0.14"/>
  <circle cx="40" cy="540" r="110" fill="#8a9a85" fill-opacity="0.1"/>
  <g filter="url(#soft-liquid-chalk)" transform="translate(0, 40)">
    <rect x="355" y="55" width="90" height="45" rx="10" fill="#6b5f54"/>
      <rect x="340" y="95" width="120" height="230" rx="20" fill="#fffcf9" stroke="#8a9a85" stroke-width="3"/>
      <rect x="360" y="130" width="80" height="120" rx="10" fill="#eef2ec"/>
      <text x="400" y="200" text-anchor="middle" fill="#8a9a85" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700">CHALK</text>
      <ellipse cx="400" cy="360" rx="55" ry="12" fill="#4a433c" fill-opacity="0.1"/>
  </g>
</svg>