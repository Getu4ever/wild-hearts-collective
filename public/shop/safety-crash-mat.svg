<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Crash Mat">
  <defs>
    <linearGradient id="bg-safety-crash-mat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6e9"/>
      <stop offset="100%" stop-color="#eef2ec"/>
    </linearGradient>
    <linearGradient id="sheen-safety-crash-mat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-safety-crash-mat" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4a433c" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg-safety-crash-mat)"/>
  <rect width="800" height="600" fill="url(#sheen-safety-crash-mat)"/>
  <circle cx="700" cy="60" r="140" fill="#d58a94" fill-opacity="0.14"/>
  <circle cx="40" cy="540" r="110" fill="#d58a94" fill-opacity="0.1"/>
  <g filter="url(#soft-safety-crash-mat)" transform="translate(0, 40)">
    <rect x="180" y="140" width="440" height="180" rx="18" fill="#8a9a85"/>
      <rect x="205" y="160" width="390" height="120" rx="12" fill="#eef2ec"/>
      <rect x="230" y="180" width="110" height="80" rx="8" fill="#d58a94" fill-opacity="0.35"/>
      <rect x="360" y="180" width="110" height="80" rx="8" fill="#d58a94" fill-opacity="0.22"/>
      <rect x="490" y="180" width="80" height="80" rx="8" fill="#d58a94" fill-opacity="0.35"/>
      <ellipse cx="400" cy="360" rx="200" ry="14" fill="#4a433c" fill-opacity="0.1"/>
  </g>
</svg>