<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Muscle Rub">
  <defs>
    <linearGradient id="bg-muscle-rub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6e9"/>
      <stop offset="100%" stop-color="#ebe4da"/>
    </linearGradient>
    <linearGradient id="sheen-muscle-rub" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-muscle-rub" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4a433c" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg-muscle-rub)"/>
  <rect width="800" height="600" fill="url(#sheen-muscle-rub)"/>
  <circle cx="700" cy="60" r="140" fill="#d58a94" fill-opacity="0.14"/>
  <circle cx="40" cy="540" r="110" fill="#d58a94" fill-opacity="0.1"/>
  <g filter="url(#soft-muscle-rub)" transform="translate(0, 40)">
    <rect x="335" y="75" width="130" height="250" rx="18" fill="#d58a94"/>
      <rect x="355" y="115" width="90" height="150" rx="10" fill="#fffcf9" opacity="0.92"/>
      <text x="400" y="185" text-anchor="middle" fill="#d58a94" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700">MUSCLE</text>
      <text x="400" y="208" text-anchor="middle" fill="#d58a94" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700">RUB</text>
      <rect x="360" y="75" width="80" height="22" rx="5" fill="#c27580"/>
  </g>
</svg>