<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Energy Bar">
  <defs>
    <linearGradient id="bg-energy-bar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6e9"/>
      <stop offset="100%" stop-color="#f8f5f0"/>
    </linearGradient>
    <linearGradient id="sheen-energy-bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-energy-bar" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4a433c" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg-energy-bar)"/>
  <rect width="800" height="600" fill="url(#sheen-energy-bar)"/>
  <circle cx="700" cy="60" r="140" fill="#d58a94" fill-opacity="0.14"/>
  <circle cx="40" cy="540" r="110" fill="#d58a94" fill-opacity="0.1"/>
  <g filter="url(#soft-energy-bar)" transform="translate(0, 40)">
    <rect x="200" y="150" width="400" height="140" rx="18" fill="#d58a94"/>
      <rect x="225" y="170" width="350" height="100" rx="12" fill="#fffcf9"/>
      <rect x="250" y="190" width="150" height="60" rx="8" fill="#f5e6e9"/>
      <text x="470" y="220" fill="#d58a94" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">ENERGY</text>
      <text x="470" y="248" fill="#8a8178" font-family="Helvetica, Arial, sans-serif" font-size="13">PLANT-BASED</text>
  </g>
</svg>