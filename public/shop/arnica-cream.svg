      <stop offset="0%" stop-color="#eef2ec"/>
      <stop offset="100%" stop-color="#f5e6e9"/>
    </linearGradient>
    <linearGradient id="sheen-arnica-cream" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
