      <circle cx="400" cy="175" r="42" fill="#eef2ec"/><circle cx="400" cy="175" r="24" fill="#8a9a85" opacity="0.5"/>
      <text x="400" y="265" text-anchor="middle" fill="#6b5f54" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">ARNICA</text>
