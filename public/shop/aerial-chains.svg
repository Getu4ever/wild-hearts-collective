        <ellipse cx="370" cy="220" rx="22" ry="28"/><ellipse cx="370" cy="270" rx="22" ry="28"/><ellipse cx="370" cy="320" rx="22" ry="28"/>
        <ellipse cx="430" cy="95" rx="22" ry="28"/><ellipse cx="430" cy="145" rx="22" ry="28"/><ellipse cx="430" cy="195" rx="22" ry="28"/>
        <ellipse cx="430" cy="245" rx="22" ry="28"/><ellipse cx="430" cy="295" rx="22" ry="28"/>
