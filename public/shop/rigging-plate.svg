    <rect x="250" y="100" width="300" height="200" rx="45" fill="#8a8178"/>
      <rect x="268" y="118" width="264" height="164" rx="36" fill="#6b5f54"/>
      <circle cx="330" cy="200" r="32" fill="#f8f5f0"/><circle cx="400" cy="200" r="32" fill="#f8f5f0"/><circle cx="470" cy="200" r="32" fill="#f8f5f0"/>
      <circle cx="330" cy="200" r="14" fill="#ebe4da"/><circle cx="400" cy="200" r="14" fill="#ebe4da"/><circle cx="470" cy="200" r="14" fill="#ebe4da"/>
  </g>
