<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Rigging Plate">
  <defs>
    <linearGradient id="bg-rigging-plate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ebe4da"/>
      <stop offset="100%" stop-color="#f5e6e9"/>
    </linearGradient>
    <linearGradient id="sheen-rigging-plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-rigging-plate" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4a433c" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg-rigging-plate)"/>
  <rect width="800" height="600" fill="url(#sheen-rigging-plate)"/>
  <circle cx="700" cy="60" r="140" fill="#6b5f54" fill-opacity="0.14"/>
  <circle cx="40" cy="540" r="110" fill="#6b5f54" fill-opacity="0.1"/>
